<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Eventos — Open Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-card: #131920;
      --bg-card2: #1a2330;
      --text-primary: #e8f4f0;
      --text-secondary: #7fa99a;
      --text-muted: #4a6b60;
      --accent: #00d4aa;
      --accent2: #005c49;
      --accent-glow: rgba(0, 212, 170, 0.15);
      --border: #1e2e28;
      --border-hover: rgba(0, 212, 170, 0.27);
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(160deg, #0d1c17 0%, #0d1117 60%);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(0,212,170,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 500;
    }

    header h1 {
      font-size: clamp(26px, 5vw, 44px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header h1 span { color: var(--accent); }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 440px;
      margin: 0 auto;
      font-weight: 300;
    }

    /* SEARCH */
    .search-section {
      background: #0d1c17;
      padding: 0 2rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      max-width: 660px;
      margin: 0 auto;
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 13px 18px;
      font-size: 14.5px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
    }

    #searchInput::placeholder { color: var(--text-muted); }

    #searchBtn {
      padding: 13px 24px;
      background: var(--accent);
      border: none;
      color: #0d1117;
      font-size: 13.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    #searchBtn:hover { background: #00f0c0; }
    #searchBtn:active { opacity: 0.85; }
    #searchBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* TAGS */
    .tags-row {
      max-width: 660px;
      margin: 12px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      font-size: 11.5px;
      padding: 4px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 4rem;
    }

    #statusArea {
      text-align: center;
      padding: 0.75rem 0;
      font-size: 14px;
      color: var(--text-secondary);
    }

    #statusArea.error { color: #ff6b6b; }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-count {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .result-count strong {
      color: var(--accent);
      font-weight: 500;
    }

    /* GRID */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
    }

    .card-img-wrap {
      width: 100%;
      height: 170px;
      overflow: hidden;
      background: var(--bg-card2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img { transform: scale(1.05); }

    .card-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .card-img-placeholder svg { opacity: 0.25; }
    .card-img-placeholder span { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

    .card-body {
      padding: 13px 15px 9px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-title {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 300;
    }

    .card-footer {
      padding: 9px 15px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }

    .card-year {
      font-size: 11.5px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-link {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 13px;
      border-radius: 999px;
      background: var(--accent2);
      color: var(--accent);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .card-link:hover {
      background: var(--accent);
      color: #0d1117;
    }

    /* STATES */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      grid-column: 1 / -1;
    }

    .empty-state svg { opacity: 0.15; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .empty-state p { font-size: 13.5px; color: var(--text-muted); }

    .welcome { text-align: center; padding: 3.5rem 1rem; }
    .welcome p { font-size: 14px; color: var(--text-muted); font-weight: 300; }
    .welcome strong { color: var(--accent); }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      header { padding: 1.75rem 1.25rem 1.5rem; }
      .search-section { padding: 0 1.25rem 1.75rem; }
      main { padding: 1.25rem 1rem 3rem; }
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
      .card-img-wrap { height: 135px; }
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Open Library API</p>
    <h1>Busca tu próximo <span>evento</span></h1>
    <p>Explora títulos, temas y autores desde la biblioteca abierta más grande del mundo</p>
  </header>

  <section class="search-section">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Busca por título, ciudad o categoría…" autocomplete="off" />
      <button id="searchBtn" onclick="doSearch()">Buscar</button>
    </div>
    <div class="tags-row" id="tagsRow"></div>
  </section>

  <main>
    <div id="statusArea"></div>
    <div id="resultCount"></div>
    <div class="results-grid" id="resultsGrid"></div>
  </main>

  <script>
    const TAGS = ["Historia", "Ciencia", "Arte", "Música", "Filosofía", "Tecnología", "Literatura", "Economía"];
    const PLACEHOLDER = `
      <div class="card-img-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="1.3">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <span>Sin imagen</span>
      </div>`;

    const tagsRow = document.getElementById("tagsRow");
    TAGS.forEach(t => {
      const btn = document.createElement("button");
      btn.className = "tag";
      btn.textContent = t;
      btn.onclick = () => { document.getElementById("searchInput").value = t; doSearch(); };
      tagsRow.appendChild(btn);
    });

    document.getElementById("searchInput").addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch();
    });

    async function doSearch() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      const btn = document.getElementById("searchBtn");
      const status = document.getElementById("statusArea");
      const countEl = document.getElementById("resultCount");
      const grid = document.getElementById("resultsGrid");

      btn.disabled = true;
      grid.innerHTML = "";
      countEl.innerHTML = "";
      status.className = "";
      status.innerHTML = `<span class="spinner"></span>Buscando "<strong>${escHtml(query)}</strong>"…`;

      try {
        const res = await fetch(
          `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=20&fields=key,title,cover_i,first_publish_year,first_sentence,author_name`
        );
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        status.innerHTML = "";

        if (!data.docs || data.docs.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#e8f4f0" stroke-width="1.3">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <h3>Sin resultados</h3>
              <p>No encontramos resultados para "<strong>${escHtml(query)}</strong>". Intenta otro término.</p>
            </div>`;
          btn.disabled = false;
          return;
        }

        countEl.innerHTML = `<p class="result-count"><strong>${data.numFound.toLocaleString()}</strong> resultados — mostrando ${data.docs.length}</p>`;
        renderCards(data.docs);

      } catch (err) {
        status.className = "error";
        status.innerHTML = `No se pudo conectar con Open Library. Verifica tu conexión e intenta de nuevo.`;
      }

      btn.disabled = false;
    }

    function renderCards(docs) {
      const grid = document.getElementById("resultsGrid");
      docs.forEach(doc => {
        const title = doc.title || "Sin título";
        const year = doc.first_publish_year || "—";
        const desc = getDesc(doc.first_sentence);
        const url = doc.key ? `https://openlibrary.org${doc.key}` : "#";

        const imgSection = doc.cover_i
          ? `<img class="card-img"
               src="https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg"
               alt="${escHtml(title)}" loading="lazy"
               onerror="this.parentElement.innerHTML='${PLACEHOLDER.replace(/'/g, "&#39;")}'"/>`
          : PLACEHOLDER;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-img-wrap">${imgSection}</div>
          <div class="card-body">
            <p class="card-title">${escHtml(title)}</p>
            <p class="card-desc">${escHtml(desc)}</p>
          </div>
          <div class="card-footer">
            <span class="card-year">${year}</span>
            <a class="card-link" href="${escHtml(url)}" target="_blank" rel="noopener noreferrer">Ver más</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function getDesc(raw) {
      if (!raw) return "Descripción no disponible.";
      if (typeof raw === "string") return raw;
      return raw.value || "Descripción no disponible.";
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("statusArea").innerHTML =
      `<div class="welcome"><p>Escribe un término y presiona <strong>Buscar</strong> para explorar</p></div>`;
  </script>
</body>
</html>
